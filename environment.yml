# Single conda environment that covers both of the analysis: the
# Python figure notebooks and the R map notebook
#
#   conda env create -f environment.yml
#   conda activate gcamwaterreuse
#

name: gcamwaterreuse

channels:
  - conda-forge

dependencies:
  # --- Python core ---
  - python=3.11
  - pip
  - pyyaml
  - numpy
  - pandas
  - scipy
  - pyarrow            
  - matplotlib
  - plotly
  - scikit-learn       
  - shap               
  - openpyxl           
  - jupyterlab
  - ipykernel

  # --- R map kernel (figure2_yearly_maps_individual.ipynb) ---
  - r-base=4.4
  - r-irkernel         # registers the "R (gcamwaterreuse)" Jupyter kernel
  - r-arrow
  - r-dplyr
  - r-ggplot2
  - r-sf
  - r-rnaturalearth
  - r-rnaturalearthdata
  - r-gridextra
  - r-scales
  - r-viridislite
  - r-irdisplay
  - r-svglite
  - r-remotes          

